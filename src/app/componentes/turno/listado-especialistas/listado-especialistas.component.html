<section class="especialistas">
    <h2>Especialistas</h2>
    <ul class="lista">
        <li *ngFor="let especialista of especialistas" class="item" (click)="obtenerEspecialista(especialista)">
            <div class="img-esp">
                <img class="imagen" [src]="especialista.img" alt="especialista">
            </div>
            <h4 class="titulo">{{especialista.datos.nombre}}</h4>
        </li>
    </ul>
</section>
