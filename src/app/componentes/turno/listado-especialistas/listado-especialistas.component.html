<section class="especialistas">
    <h2>Especialistas</h2>
    <ul class="lista">
        <li *ngFor="let especialista of especialistas" class="item" (click)="obtenerEspecialista(especialista)">
            <h4>{{especialista.datos.nombre}}</h4>
            <img class="imagen" src="../../../../assets/download.jpg" alt="especialista">
        </li>
    </ul>
</section>
