<section class="logs">
  <h2>Turnos por día</h2>
    <canvas
    baseChart
    class="chart-trd"
    [data]="barChartData"
    [options]="barChartOptions"
    [plugins]="barChartPlugins"
    [type]="barChartType"
    (chartHover)="chartHovered($event)"
    (chartClick)="chartClicked($event)"
  >
  </canvas>
  <button type="button" class="btn btn-primary" (click)="exportToPDF()">Guardar Gráfico</button>
  </section>
